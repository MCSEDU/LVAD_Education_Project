name: Website Build & Deploy

on:
  push:
    branches:
      - feature/website-core-components
      - launch-q3-2026
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Run lint
        working-directory: website
        run: npm run lint --if-present

      - name: Run tests
        working-directory: website
        run: npm test --if-present

      - name: Build website
        working-directory: website
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/launch-q3-2026'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Deploy to Vercel (if configured)
        working-directory: website
        run: npx vercel --prod --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
